{% extends "base.html" %}

{% block page_title %}Categories{% endblock page_title %}

{% block content %}
<div class="content well">
<header id="post-header">
    <h1 id="post-subtitle">All Categories</h1>
</header>
<div id="post-content">
    <hr />
    {% for term in terms %}
      <a href="{{ term.permalink }}" hreflang="en" class="btn btn-sm btn-default btn-raised">{{ term.name }}</a>
    {% endfor %}
    <hr />
</div>
</div>
{% endblock content %}
